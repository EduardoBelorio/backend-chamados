<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamados de TI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; }
    .top-bar { background: #fff; border-bottom: 0.5px solid #e0e0e0; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar h1 { font-size: 16px; font-weight: 500; }
    .top-bar span { font-size: 12px; color: #666; background: #f5f5f3; padding: 4px 10px; border-radius: 8px; border: 0.5px solid #e0e0e0; }
    .content { padding: 20px 24px; max-width: 960px; margin: 0 auto; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .metric { background: #ebebeb; border-radius: 8px; padding: 14px 16px; }
    .metric-label { font-size: 12px; color: #666; margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .section { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
    .section-header { padding: 14px 16px; border-bottom: 0.5px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
    .section-header h2 { font-size: 14px; font-weight: 500; }
    .section-body { padding: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: #666; }
    .form-group input, .form-group select, .form-group textarea { font-size: 13px; padding: 8px 10px; border: 0.5px solid #e0e0e0; border-radius: 8px; background: #fff; color: #1a1a1a; width: 100%; outline: none; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #999; }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-full { grid-column: 1 / -1; }
    .btn { font-size: 13px; padding: 8px 16px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: #f5f5f3; }
    .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 500; color: #888; border-bottom: 0.5px solid #e0e0e0; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 10px 12px; border-bottom: 0.5px solid #e0e0e0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 500; display: inline-block; }
    .badge-alta { background: #FAECE7; color: #993C1D; }
    .badge-media { background: #FAEEDA; color: #854F0B; }
    .badge-baixa { background: #EAF3DE; color: #3B6D11; }
    .badge-aberto { background: #E6F1FB; color: #185FA5; }
    .badge-andamento { background: #EEEDFE; color: #534AB7; }
    .badge-resolvido { background: #EAF3DE; color: #3B6D11; }
    .msg { font-size: 13px; color: #888; text-align: center; padding: 24px; }
    .actions { display: flex; gap: 6px; }
    .btn-sm { font-size: 11px; padding: 4px 10px; }
    .btn-danger { color: #993C1D; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>Chamados de TI</h1>
  <span id="status-badge">Conectando...</span>
</div>

<div class="content">
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Abertos</div><div class="metric-value" id="m-abertos">—</div></div>
    <div class="metric"><div class="metric-label">Em andamento</div><div class="metric-value" id="m-andamento">—</div></div>
    <div class="metric"><div class="metric-label">Resolvidos</div><div class="metric-value" id="m-resolvidos">—</div></div>
  </div>

  <div class="section">
    <div class="section-header"><h2>Novo chamado</h2></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group form-full">
          <label>Título</label>
          <input id="f-titulo" type="text" placeholder="Ex: Computador não liga">
        </div>
        <div class="form-group form-full">
          <label>Descrição</label>
          <textarea id="f-desc" placeholder="Descreva o problema..."></textarea>
        </div>
        <div class="form-group">
          <label>Prioridade</label>
          <select id="f-prio">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>
            <option value="alta">Alta</option>
          </select>
        </div>
        <div class="form-group">
          <label>Responsável</label>
          <input id="f-resp" type="text" placeholder="Nome do responsável">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="criarChamado()">Criar chamado</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Chamados</h2>
      <button class="btn" onclick="carregarChamados()">Atualizar</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Prioridade</th>
            <th>Status</th>
            <th>Responsável</th>
            <th>Criado em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-chamados">
          <tr><td colspan="7"><div class="msg">Carregando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';

  function badgePrio(p) {
    const m = { alta: 'badge-alta', media: 'badge-media', baixa: 'badge-baixa' };
    return `<span class="badge ${m[p] || ''}">${p}</span>`;
  }

  function badgeStatus(s) {
    const m = { aberto: 'badge-aberto', em_andamento: 'badge-andamento', resolvido: 'badge-resolvido' };
    const l = { aberto: 'aberto', em_andamento: 'em andamento', resolvido: 'resolvido' };
    return `<span class="badge ${m[s] || ''}">${l[s] || s}</span>`;
  }

  function formatData(d) {
    return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  async function carregarChamados() {
    try {
      const r = await fetch(`${API}/chamados/`);
      const data = await r.json();
      document.getElementById('status-badge').textContent = 'API conectada';
      document.getElementById('m-total').textContent = data.length;
      document.getElementById('m-abertos').textContent = data.filter(c => c.status === 'aberto').length;
      document.getElementById('m-andamento').textContent = data.filter(c => c.status === 'em_andamento').length;
      document.getElementById('m-resolvidos').textContent = data.filter(c => c.status === 'resolvido').length;
      const tbody = document.getElementById('tabela-chamados');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="msg">Nenhum chamado cadastrado.</div></td></tr>';
        return;
      }
      tbody.innerHTML = data.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.titulo}</td>
          <td>${badgePrio(c.prioridade)}</td>
          <td>${badgeStatus(c.status)}</td>
          <td>${c.responsavel}</td>
          <td>${formatData(c.criado_em)}</td>
          <td><div class="actions">
            <button class="btn btn-sm" onclick="resolverChamado(${c.id})">Resolver</button>
            <button class="btn btn-sm btn-danger" onclick="deletarChamado(${c.id})">Excluir</button>
          </div></td>
        </tr>`).join('');
    } catch (e) {
      document.getElementById('status-badge').textContent = 'API offline';
      document.getElementById('tabela-chamados').innerHTML = '<tr><td colspan="7"><div class="msg">Ligue a API com: uvicorn main:app --reload</div></td></tr>';
    }
  }

  async function criarChamado() {
    const titulo = document.getElementById('f-titulo').value.trim();
    const descricao = document.getElementById('f-desc').value.trim();
    const prioridade = document.getElementById('f-prio').value;
    const responsavel = document.getElementById('f-resp').value.trim();
    if (!titulo || !responsavel) { alert('Preencha título e responsável.'); return; }
    await fetch(`${API}/chamados/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ titulo, descricao, prioridade, responsavel })
    });
    document.getElementById('f-titulo').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-resp').value = '';
    carregarChamados();
  }

  async function resolverChamado(id) {
    await fetch(`${API}/chamados/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'resolvido' })
    });
    carregarChamados();
  }

  async function deletarChamado(id) {
    if (!confirm('Excluir este chamado?')) return;
    await fetch(`${API}/chamados/${id}`, { method: 'DELETE' });
    carregarChamados();
  }

  carregarChamados();
</script>
</body>
</html>
